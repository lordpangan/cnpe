apiVersion: apps/v1
kind: Deployment
metadata:
  name: tkn-demo-app1
  labels:
    app: tkn-demo-app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tkn-demo-app1
  template:
    metadata:
      labels:
        app: tkn-demo-app1
    spec:
      containers:
        - name: tkn-demo-app1
          image: kind-registry:5000/tkn-demo-app1:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
